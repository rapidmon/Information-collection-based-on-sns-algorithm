<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>대시보드 - SNS Tech Briefing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="min-h-screen">
    <!-- 네비게이션 -->
    <nav class="sticky top-0 z-50" style="backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); background: linear-gradient(180deg, rgba(15,15,13,0.9), rgba(15,15,13,0.7)); border-bottom: 2px solid rgba(0, 87, 255, 0.2); box-shadow: 0 0 30px rgba(0, 87, 255, 0.1), 0 8px 32px rgba(0, 0, 0, 0.3);">
        <div style="position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, rgba(0, 87, 255, 0.3), transparent);"></div>
        <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
            <a href="index.html" class="text-lg font-bold" style="color: var(--text-primary);">SNS Tech Briefing</a>
            <div class="flex gap-8">
                <a href="index.html" data-nav class="btn-ghost">대시보드</a>
                <a href="briefings.html" data-nav class="btn-ghost">브리핑 아카이브</a>
                <a href="posts.html" data-nav class="btn-ghost">게시물 탐색</a>
            </div>
        </div>
    </nav>

    <!-- 메인 콘텐츠 -->
    <main class="max-w-7xl mx-auto px-4 py-8">
        <!-- 수집 통계 카드 -->
        <div id="stats-cards" class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
            <div class="card p-4 col-span-2 md:col-span-4 text-center">
                <div class="flex justify-center items-center py-2">
                    <div class="spinner"></div>
                    <span class="ml-3 text-sm" style="color: var(--text-muted);">통계 불러오는 중...</span>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- 최신 브리핑 (2/3 너비) -->
            <div class="lg:col-span-2">
                <div class="card overflow-hidden flex flex-col">
                    <div class="px-6 pt-6 pb-4 flex justify-between items-start">
                        <h2 id="briefing-title" class="text-xl font-bold" style="color: var(--text-primary);">최신 브리핑</h2>
                    </div>
                    <div id="briefing-content" class="px-6 pb-6 flex-1 overflow-y-auto briefing-content">
                        <div class="flex justify-center items-center py-8">
                            <div class="spinner"></div>
                            <span class="ml-3 text-sm" style="color: var(--text-muted);">불러오는 중...</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 사이드바 (1/3 너비) -->
            <div class="space-y-6">
                <!-- 최근 수집 현황 -->
                <div class="card p-4">
                    <h3 class="font-bold mb-3" style="color: var(--text-secondary);">최근 수집 현황</h3>
                    <div id="recent-runs">
                        <div class="flex justify-center py-4">
                            <div class="spinner"></div>
                        </div>
                    </div>
                </div>

                <!-- 최근 게시물 미리보기 -->
                <div class="card p-4">
                    <h3 class="font-bold mb-3" style="color: var(--text-secondary);">최근 수집 게시물</h3>
                    <div id="recent-posts">
                        <div class="flex justify-center py-4">
                            <div class="spinner"></div>
                        </div>
                    </div>
                    <a href="posts.html" class="block text-center text-sm mt-3 transition-colors" style="color: var(--text-secondary);" onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--text-secondary)'">전체 보기 →</a>
                </div>
            </div>
        </div>
    </main>

    <footer class="text-center text-xs py-6" style="color: var(--text-muted); border-top: 2px solid rgba(0, 87, 255, 0.2); background: linear-gradient(180deg, transparent, rgba(0, 87, 255, 0.05)); position: relative;">
        <div style="position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, rgba(0, 87, 255, 0.3), transparent);"></div>
        SNS Tech Briefing System v0.1.0
    </footer>

    <script>
        document.addEventListener('scroll', () => {
            const nav = document.querySelector('nav');
            if (window.scrollY > 8) {
                nav.style.background = 'linear-gradient(180deg, rgba(15,15,13,0.95), rgba(15,15,13,0.85))';
                nav.style.boxShadow = '0 0 40px rgba(0, 87, 255, 0.15), 0 12px 40px rgba(0, 0, 0, 0.4)';
            } else {
                nav.style.background = 'linear-gradient(180deg, rgba(15,15,13,0.9), rgba(15,15,13,0.7))';
                nav.style.boxShadow = '0 0 30px rgba(0, 87, 255, 0.1), 0 8px 32px rgba(0, 0, 0, 0.3)';
            }
        }, { passive: true });
    </script>

    <script type="module">
        import { getSourceCounts24h, getLatestBriefing, getRecentPosts, getRecentRuns } from './js/firestore-api.js';
        import { formatTimestamp, sourceBadge, escapeHtml, truncate, setActiveNav } from './js/app.js';

        setActiveNav();

        // 수집 통계 카드 로드
        async function loadStats() {
            try {
                const counts = await getSourceCounts24h();
                const container = document.getElementById('stats-cards');
                const sources = Object.keys(counts);

                if (sources.length === 0) {
                    container.innerHTML = `
                        <div class="card p-4 col-span-2 md:col-span-4 text-center" style="color: var(--text-muted);">
                            아직 수집된 데이터가 없습니다.
                        </div>`;
                    return;
                }

                container.innerHTML = sources.map(source => `
                    <div class="card p-4">
                        <div class="text-sm uppercase" style="color: var(--text-muted);">${escapeHtml(source)}</div>
                        <div class="text-3xl font-bold mt-1 stat-number">${counts[source]}</div>
                        <div class="text-xs" style="color: var(--text-muted);">최근 24시간</div>
                    </div>
                `).join('');
            } catch (e) {
                document.getElementById('stats-cards').innerHTML = `
                    <div class="card p-4 col-span-2 md:col-span-4 text-center">
                        <p class="text-sm" style="color: var(--status-error);">통계를 불러올 수 없습니다.</p>
                        <p class="text-xs mt-1" style="color: var(--text-muted);">Firebase 설정을 확인해주세요.</p>
                    </div>`;
            }
        }

        // 최신 브리핑 로드
        async function loadBriefing() {
            try {
                const briefing = await getLatestBriefing();
                const titleEl = document.getElementById('briefing-title');
                const contentEl = document.getElementById('briefing-content');

                if (!briefing) {
                    contentEl.innerHTML = `<p class="text-center py-8" style="color: var(--text-muted);">아직 생성된 브리핑이 없습니다.</p>`;
                    return;
                }

                titleEl.textContent = briefing.title || '최신 브리핑';

                if (briefing.content_html) {
                    contentEl.innerHTML = briefing.content_html;
                } else if (briefing.content_text) {
                    contentEl.innerHTML = `<pre class="whitespace-pre-wrap text-sm" style="font-family: inherit; color: var(--text-secondary);">${escapeHtml(briefing.content_text)}</pre>`;
                } else {
                    contentEl.innerHTML = `<p class="text-center py-8" style="color: var(--text-muted);">콘텐츠 없음</p>`;
                }
            } catch (e) {
                document.getElementById('briefing-content').innerHTML = `
                    <div class="card p-4 text-center">
                        <p class="text-sm" style="color: var(--status-error);">브리핑을 불러올 수 없습니다.</p>
                    </div>`;
            }
        }

        // 최근 수집 현황 로드
        async function loadRuns() {
            try {
                const runs = await getRecentRuns(8);
                const container = document.getElementById('recent-runs');

                if (runs.length === 0) {
                    container.innerHTML = `<p class="text-sm text-center py-4" style="color: var(--text-muted);">수집 기록 없음</p>`;
                    return;
                }

                container.innerHTML = runs.map(run => {
                    const time = formatTimestamp(run.started_at, 'time');
                    let statusDot = 'dot-warning';
                    if (run.status === 'success') statusDot = 'dot-success';
                    else if (run.status === 'failed') statusDot = 'dot-error';

                    return `
                    <div class="flex justify-between items-center py-2 text-sm" style="border-bottom: 1px solid var(--border-subtle);">
                        <div>
                            <span class="font-medium" style="color: var(--text-primary);">${escapeHtml(run.source)}</span>
                            <span class="text-xs ml-1" style="color: var(--text-muted);">${time}</span>
                        </div>
                        <div class="flex items-center gap-2">
                            <span style="color: var(--text-muted);">${run.posts_collected || 0}건</span>
                            <span class="dot ${statusDot}"></span>
                        </div>
                    </div>`;
                }).join('');
            } catch (e) {
                document.getElementById('recent-runs').innerHTML =
                    `<p class="text-sm text-center py-4" style="color: var(--status-error);">불러오기 실패</p>`;
            }
        }

        // 최근 게시물 미리보기 로드
        async function loadRecentPosts() {
            try {
                const { posts } = await getRecentPosts({ limitCount: 10 });
                const container = document.getElementById('recent-posts');

                if (posts.length === 0) {
                    container.innerHTML = `<p class="text-sm text-center py-4" style="color: var(--text-muted);">게시물 없음</p>`;
                    return;
                }

                container.innerHTML = posts.map(post => `
                    <div class="py-2" style="border-bottom: 1px solid var(--border-subtle);">
                        <div class="flex items-center gap-2 mb-1">
                            <span class="badge badge-${escapeHtml(post.source)}" style="font-size: 0.65rem; padding: 0.2rem 0.5rem;">${escapeHtml(post.source)}</span>
                            <span class="text-xs" style="color: var(--text-muted);">${escapeHtml(truncate(post.author || '', 20))}</span>
                        </div>
                        ${post.url
                            ? `<a href="${escapeHtml(post.url)}" target="_blank" rel="noopener" class="text-sm line-clamp-2 transition-colors" style="color: var(--text-secondary);" onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--text-secondary)'">${escapeHtml(truncate(post.content_text, 100))}</a>`
                            : `<p class="text-sm line-clamp-2" style="color: var(--text-secondary);">${escapeHtml(truncate(post.content_text, 100))}</p>`
                        }
                    </div>
                `).join('');
            } catch (e) {
                document.getElementById('recent-posts').innerHTML =
                    `<p class="text-sm text-center py-4" style="color: var(--status-error);">불러오기 실패</p>`;
            }
        }

        // 병렬 로드
        Promise.all([loadStats(), loadBriefing(), loadRuns(), loadRecentPosts()]);
    </script>
</body>
</html>
