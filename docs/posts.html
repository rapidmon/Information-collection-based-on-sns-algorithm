<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>게시물 탐색 - SNS Tech Briefing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="min-h-screen">
    <!-- 네비게이션 -->
    <nav class="sticky top-0 z-50" style="backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); background: linear-gradient(180deg, rgba(15,15,13,0.9), rgba(15,15,13,0.7)); border-bottom: 2px solid rgba(0, 87, 255, 0.2); box-shadow: 0 0 30px rgba(0, 87, 255, 0.1), 0 8px 32px rgba(0, 0, 0, 0.3);">
        <div style="position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, rgba(0, 87, 255, 0.3), transparent);"></div>
        <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
            <a href="index.html" class="text-lg font-bold" style="color: var(--text-primary);">SNS Tech Briefing</a>
            <div class="flex gap-8">
                <a href="index.html" data-nav class="btn-ghost">대시보드</a>
                <a href="briefings.html" data-nav class="btn-ghost">브리핑 아카이브</a>
                <a href="posts.html" data-nav class="btn-ghost">게시물 탐색</a>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-8">
        <h1 class="text-2xl font-bold mb-4" style="color: var(--text-primary);">게시물 탐색</h1>

        <!-- 필터 바 -->
        <div class="card p-4 mb-6">
            <div class="flex flex-wrap gap-3 items-end">
                <div class="flex-1 min-w-[200px]">
                    <label class="text-xs block mb-1" style="color: var(--text-muted);">검색</label>
                    <input type="text" id="search-input" placeholder="키워드 검색..."
                           class="input-dark w-full">
                </div>
                <div>
                    <label class="text-xs block mb-1" style="color: var(--text-muted);">소스</label>
                    <select id="source-filter" class="input-dark">
                        <option value="">전체</option>
                        <option value="twitter">twitter</option>
                        <option value="threads">threads</option>
                        <option value="linkedin">linkedin</option>
                        <option value="dcinside">dcinside</option>
                    </select>
                </div>
                <div>
                    <label class="text-xs block mb-1" style="color: var(--text-muted);">카테고리</label>
                    <select id="category-filter" class="input-dark">
                        <option value="">전체</option>
                    </select>
                </div>
                <button id="search-btn" class="btn-primary px-5 py-2">
                    검색
                </button>
                <button id="reset-btn" class="btn-ghost py-2" style="color: var(--text-secondary);">
                    초기화
                </button>
            </div>
        </div>

        <!-- 게시물 플립 카드 그리드 -->
        <div id="posts-list" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
            <div class="flex justify-center items-center py-12">
                <div class="spinner"></div>
                <span class="ml-3 text-sm" style="color: var(--text-muted);">불러오는 중...</span>
            </div>
        </div>

        <!-- 더 보기 버튼 -->
        <div id="load-more-wrapper" class="flex justify-center mt-8 hidden">
            <button id="load-more-btn" class="btn-secondary px-6 py-2">
                더 보기
            </button>
        </div>
    </main>

    <footer class="text-center text-xs py-6" style="color: var(--text-muted); border-top: 2px solid rgba(0, 87, 255, 0.2); background: linear-gradient(180deg, transparent, rgba(0, 87, 255, 0.05)); position: relative;">
        <div style="position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, rgba(0, 87, 255, 0.3), transparent);"></div>
        SNS Tech Briefing System v0.1.0
    </footer>

    <script>
        document.addEventListener('scroll', () => {
            const nav = document.querySelector('nav');
            if (window.scrollY > 8) {
                nav.style.background = 'linear-gradient(180deg, rgba(15,15,13,0.95), rgba(15,15,13,0.85))';
                nav.style.boxShadow = '0 0 40px rgba(0, 87, 255, 0.15), 0 12px 40px rgba(0, 0, 0, 0.4)';
            } else {
                nav.style.background = 'linear-gradient(180deg, rgba(15,15,13,0.9), rgba(15,15,13,0.7))';
                nav.style.boxShadow = '0 0 30px rgba(0, 87, 255, 0.1), 0 8px 32px rgba(0, 0, 0, 0.3)';
            }
        }, { passive: true });
    </script>

    <script type="module">
        import { getRecentPosts, getCategories } from './js/firestore-api.js';
        import { renderPostCard, showError, showEmpty, setActiveNav, skeletonCards } from './js/app.js';

        setActiveNav();

        let lastDoc = null;
        let isLoading = false;

        const postsList = document.getElementById('posts-list');
        const loadMoreWrapper = document.getElementById('load-more-wrapper');
        const loadMoreBtn = document.getElementById('load-more-btn');
        const searchInput = document.getElementById('search-input');
        const sourceFilter = document.getElementById('source-filter');
        const categoryFilter = document.getElementById('category-filter');
        const searchBtn = document.getElementById('search-btn');
        const resetBtn = document.getElementById('reset-btn');

        // 카테고리 드롭다운 로드
        async function loadCategories() {
            try {
                const categories = await getCategories();
                categories.forEach(cat => {
                    const opt = document.createElement('option');
                    opt.value = cat.name;
                    opt.textContent = `${cat.name_ko || cat.name} (${cat.name})`;
                    categoryFilter.appendChild(opt);
                });
            } catch (e) {
                // 카테고리 로드 실패 시 무시
            }
        }

        // 게시물 로드
        async function loadPosts(append = false) {
            if (isLoading) return;
            isLoading = true;

            if (!append) {
                postsList.innerHTML = skeletonCards(5);
                lastDoc = null;
            } else {
                loadMoreBtn.textContent = '불러오는 중...';
                loadMoreBtn.disabled = true;
            }

            try {
                const opts = {
                    source: sourceFilter.value || undefined,
                    category: categoryFilter.value || undefined,
                    searchQuery: searchInput.value.trim() || undefined,
                    limitCount: 50,
                    lastDoc: append ? lastDoc : null,
                };

                const result = await getRecentPosts(opts);
                lastDoc = result.lastDoc;

                if (result.posts.length === 0 && !append) {
                    showEmpty('posts-list', '조건에 맞는 게시물이 없습니다.');
                    loadMoreWrapper.classList.add('hidden');
                    return;
                }

                const html = result.posts.map(renderPostCard).join('');

                if (append) {
                    postsList.insertAdjacentHTML('beforeend', html);
                } else {
                    postsList.innerHTML = html;
                }

                if (result.posts.length >= 50) {
                    loadMoreWrapper.classList.remove('hidden');
                } else {
                    loadMoreWrapper.classList.add('hidden');
                }
            } catch (e) {
                if (!append) {
                    showError('posts-list', '게시물을 불러올 수 없습니다.');
                }
            } finally {
                isLoading = false;
                loadMoreBtn.textContent = '더 보기';
                loadMoreBtn.disabled = false;
            }
        }

        // 이벤트 핸들러
        searchBtn.addEventListener('click', () => loadPosts(false));

        searchInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') loadPosts(false);
        });

        resetBtn.addEventListener('click', () => {
            searchInput.value = '';
            sourceFilter.value = '';
            categoryFilter.value = '';
            loadPosts(false);
        });

        loadMoreBtn.addEventListener('click', () => loadPosts(true));

        // 초기 로드
        loadCategories();
        loadPosts(false);
    </script>
</body>
</html>
